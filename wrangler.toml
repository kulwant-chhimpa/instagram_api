name = "instagram-api-worker"
type = "javascript"
main = "cloudflare-worker.js"
compatibility_date = "2024-01-01"

# KV namespace binding for caching
[[kv_namespaces]]
binding = "INSTAGRAM_CACHE"
id = "YOUR_KV_NAMESPACE_ID"  # Replace with actual ID from Cloudflare

# Environment-specific settings
[env.production]
routes = [
  { pattern = "instagram-api-worker.YOUR_DOMAIN.workers.dev/*", zone_name = "YOUR_DOMAIN" }
]

[env.development]
routes = [
  { pattern = "instagram-api-worker-dev.YOUR_DOMAIN.workers.dev/*", zone_name = "YOUR_DOMAIN" }
]
